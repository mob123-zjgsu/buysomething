openapi: 3.0.3
info:
  title: BuySomething 小程序 API
  description: 微信小程序购物商城后端 API 文档
  version: 1.0.0
  contact:
    name: API Support
    email: support@buysomething.com

servers:
  - url: https://buysomething-6gbmbtpxff05be35.service.tcloudbase.com
    description: CloudBase 云函数 HTTP 入口

paths:
  /login:
    post:
      summary: 用户登录
      description: 用户手机号密码登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - password
              properties:
                phone:
                  type: string
                  description: 手机号
                  example: "13800138001"
                password:
                  type: string
                  description: 密码（MD5加密）
                  example: "123456"
                code:
                  type: string
                  description: 短信验证码（测试阶段可用0000跳过）
                  example: "0000"
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                      userInfo:
                        type: object

  /products:
    get:
      summary: 商品列表
      description: 获取商品列表，支持分页和筛选
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: categoryId
          in: query
          schema:
            type: string
        - name: keyword
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, sales]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          type: object
                      total:
                        type: integer

  /product-detail:
    get:
      summary: 商品详情
      description: 获取单个商品详情
      parameters:
        - name: productId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object

  /cart:
    get:
      summary: 获取购物车
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
    post:
      summary: 添加购物车
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                productId:
                  type: string
                quantity:
                  type: integer
      responses:
        '200':
          description: 成功

  /orders:
    get:
      summary: 订单列表
      parameters:
        - name: userId
          in: query
          required: true
        - name: status
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功
    post:
      summary: 创建订单
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - items
              properties:
                userId:
                  type: string
                addressId:
                  type: string
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: string
                      quantity:
                        type: integer
                remark:
                  type: string
      responses:
        '200':
          description: 成功

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 1001
        message:
          type: string
          example: "错误信息"
        data:
          type: object