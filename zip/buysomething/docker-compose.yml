version: '3.8'

# BuySomething 电商小程序 - Docker 开发环境配置
# 此配置用于本地开发环境演示，实际生产使用 CloudBase 云端部署

services:
  # MongoDB 数据库服务
  mongodb:
    image: mongo:6.0
    container_name: buysomething-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: buysomething123
      MONGO_INITDB_DATABASE: buysomething
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - backend

  # Redis 缓存服务（可选，用于会话缓存）
  redis:
    image: redis:7-alpine
    container_name: buysomething-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend

  # API 服务（Node.js 后端示例）
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: buysomething-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:buysomething123@mongodb:27017/buysomething?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - backend
    # 开发模式热重载
    command: npm run dev

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: buysomething-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
