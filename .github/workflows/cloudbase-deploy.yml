# CloudBase 云函数自动化部署工作流

name: Deploy CloudBase Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Check directory structure
        run: |
          pwd
          ls -la
          ls -la cloudfunctions/ 2>/dev/null || ls -la buysomething/cloudfunctions/ 2>/dev/null || echo "cloudfunctions not found"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@latest
      
      - name: Deploy to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          export CI=true
          # 找到 cloudfunctions 目录位置
          if [ -d "cloudfunctions" ]; then
            cd cloudfunctions
          elif [ -d "buysomething/cloudfunctions" ]; then
            cd buysomething/cloudfunctions
          fi
          pwd
          ls -la
          tcb login --apiKeyId $TCB_SECRET_ID --apiKey $TCB_SECRET_KEY || true
          tcb fn deploy --all --envId $TCB_ENV_ID --force
