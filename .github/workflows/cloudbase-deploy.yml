# CloudBase 云函数自动化部署工作流

name: Deploy CloudBase Functions

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install CloudBase CLI
        run: npm install -g @cloudbase/cli@latest
      
      - name: Configure CLI
        run: |
          echo "y" | tcb login --apiKeyId ${{ secrets.TCB_SECRET_ID }} --apiKey ${{ secrets.TCB_SECRET_KEY }} || true
      
      - name: Deploy to CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          export CI=true
          cd cloudfunctions
          tcb fn deploy --all --envId $TCB_ENV_ID --force
