# ================================================
# 优选购物小程序 - 前端开发环境 Docker Compose
# 使用方法: docker compose -f compose.yaml up -d
# ================================================

services:
  # 前端演示服务
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buysomething-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
    volumes:
      # 热重载：挂载源代码
      - .:/app
      - /app/node_modules
    networks:
      - frontend-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  frontend-network:
    driver: bridge
